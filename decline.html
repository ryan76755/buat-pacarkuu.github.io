<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 Aw Please?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="center-page">

  <div class="paper-bg"></div>

  <main class="center-content">

    <!-- Sad cat SVG -->
    <div class="cat-wrap">
      <svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" class="cat-svg">
        <!-- flat lying body -->
        <ellipse cx="110" cy="168" rx="72" ry="26" fill="#fff5f5"/>
        <!-- head -->
        <ellipse cx="110" cy="110" rx="52" ry="46" fill="#fff5f5"/>
        <!-- drooped ears -->
        <polygon points="72,78 55,50 84,72" fill="#fff5f5"/>
        <polygon points="148,78 165,50 136,72" fill="#fff5f5"/>
        <polygon points="73,76 62,54 84,70" fill="#ffc0cb" opacity="0.4"/>
        <polygon points="147,76 158,54 136,70" fill="#ffc0cb" opacity="0.4"/>
        <!-- sad eyes (upward arcs) -->
        <path d="M82 110 Q90 103 98 110" stroke="#3a2020" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M122 110 Q130 103 138 110" stroke="#3a2020" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- tears -->
        <ellipse cx="82"  cy="118" rx="3.5" ry="5" fill="#aad4f5" opacity="0.85"/>
        <ellipse cx="138" cy="118" rx="3.5" ry="5" fill="#aad4f5" opacity="0.85"/>
        <!-- blush -->
        <ellipse cx="78"  cy="124" rx="12" ry="7" fill="#ffb6c1" opacity="0.6"/>
        <ellipse cx="142" cy="124" rx="12" ry="7" fill="#ffb6c1" opacity="0.6"/>
        <!-- sad mouth -->
        <path d="M100 132 Q110 126 120 132" stroke="#c06070" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- whiskers -->
        <line x1="60"  y1="118" x2="88"  y2="121" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="132" y1="121" x2="160" y2="118" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
        <!-- flat paws -->
        <ellipse cx="64"  cy="174" rx="20" ry="11" fill="#fff5f5"/>
        <ellipse cx="156" cy="174" rx="20" ry="11" fill="#fff5f5"/>
      </svg>
    </div>

    <h1 class="main-title decline">AW PLEASE?</h1>
    <p class="sub-text">I prepared this gift for you</p>

    <a href="index.html" class="btn-circle btn-back" title="Go back">←</a>

  </main>

</body>
</html>
